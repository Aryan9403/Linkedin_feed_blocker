<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkedIn Feed Blocker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      padding: 20px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #0077b5;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 16px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .label {
      font-size: 13px;
      font-weight: 500;
      color: #ccc;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      background: #555;
      transition: background 0.3s;
    }

    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 24px;
      transition: background 0.25s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #666;
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }

    input:checked + .slider {
      background: #1a3a2a;
    }

    input:checked + .slider::before {
      transform: translateX(20px);
      background: #22c55e;
    }

    .divider {
      height: 1px;
      background: #222;
      margin: 14px 0;
    }

    .status-text {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 14px;
      transition: color 0.3s;
    }

    .status-text.on {
      color: #22c55e99;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">in</div>
    <div>
      <div class="title">Feed Blocker</div>
      <div class="subtitle">LinkedIn distraction shield</div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <span class="label">
        <span class="status-dot" id="dot"></span>Block feed
      </span>
      <label class="toggle">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="row" style="justify-content: center;">
      <span style="font-size:11px; color:#444">Reload the tab after toggling</span>
    </div>
  </div>

  <div class="status-text" id="statusText">Feed is unblocked</div>

  <script>
    const toggle = document.getElementById('toggle');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');

    function updateUI(enabled) {
      toggle.checked = enabled;
      dot.className = 'status-dot' + (enabled ? ' active' : '');
      statusText.textContent = enabled ? 'Feed is blocked 🚫' : 'Feed is unblocked';
      statusText.className = 'status-text' + (enabled ? ' on' : '');
    }

    // Load current state
    chrome.storage.sync.get({ feedBlocked: true }, ({ feedBlocked }) => {
      updateUI(feedBlocked);
    });

    // On toggle
    toggle.addEventListener('change', () => {
      const enabled = toggle.checked;
      chrome.storage.sync.set({ feedBlocked: enabled });
      updateUI(enabled);
    });
  </script>
</body>
</html>
